server:
  port: 8080

spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:9090/realms/voice-messenger
          jwk-set-uri: http://keycloak:9090/realms/voice-messenger/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: gateway-client
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://keycloak:9090/realms/voice-messenger
  cloud:
    gateway:
      default-filters:
        - TokenRelay
      routes:
        - id: signaling-route
          uri: ${SIGNALING_URI}
          predicates:
            - Path=/ws/signal/**
        - id: chat-route
          uri: ${CHAT_URI}
          predicates:
            - Path=/api/chat/**, /ws/**
        - id: room-route
          uri: ${ROOM_URI}
          predicates:
            - Path=/api/servers/**, /api/friendships/**, /api/users/**
        - id: ai-route
          uri: ${AI_URI}
          predicates:
            - Path=/api/ai/**
        - id: analytics-route
          uri: ${ANALYTICS_URI}
          predicates:
            - Path=/api/analytics/**
        - id: media-api-route
          uri: ${MEDIA_URI}
          predicates:
            - Path=/api/media/**
