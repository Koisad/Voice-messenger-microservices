server:
  port: 8080

spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:9090/realms/voice-messenger
          jwk-set-uri: http://keycloak:9090/realms/voice-messenger/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: gateway-client
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://keycloak:9090/realms/voice-messenger
  cloud:
    gateway:
      default-filters:
        - TokenRelay
      routes:
        - id: chat-route
          uri: http://chat-service:8082
          predicates:
            - Path=/api/chat/**
        - id: signaling-route
          uri: ws://signaling-service:8083
          predicates:
            - Path=/ws/signal/**
        - id: ai-route
          uri: http://ai-service:8084
          predicates:
            - Path=/api/ai/**
        - id: analytics-route
          uri: http://analytics-service:8085
          predicates:
            - Path=/api/analytics/**
        - id: media-api-route
          uri: http://media-service:8888
          predicates:
            - Path=/api/media/**